          { q: "这家饭馆_____菜很好吃，_____环境很好。", options: ["只要...就...", "不但...而且...", "如果...就...", "因为...所以..."], answer: "不但...而且..." },
          { q: "_____大家想吃，我_____去做。", options: ["不但...而且...", "只要...就...", "关于...的...", "除了...都..."], answer: "只要...就..." },
          { q: "我最近看了一些_____中国文化的电影。", options: ["关于", "向", "从", "给"], answer: "关于" },
          { q: "只要你努力学习，_____一定能考好。", options: ["就", "才", "还", "也"], answer: "就" },
          { q: "小孩子喜欢快乐_____学习。", options: ["地", "的", "得", "了"], answer: "地" },
          { q: "请你_____他借点儿钱。", options: ["对", "给", "向", "为"], answer: "向" },
          { q: "_____这个问题，我不担心。", options: ["向", "关于", "从", "用"], answer: "关于" },
          { q: "我们_____喜欢喝茶，_____喜欢喝咖啡。", options: ["不但...而且...", "只要...就...", "因为...所以...", "虽然...但是..."], answer: "不但...而且..." },
          { q: "只要明天下雨，我们_____不去公园了。", options: ["就", "还", "又", "才"], answer: "就" },
          { q: "请_____右边看。", options: ["关于", "离", "从", "向"], answer: "向" },
          { q: "只要你早点儿睡觉，明天_____不会迟到。", options: ["也", "还", "就", "才"], answer: "就" }
        ];

        const exerciseWords1 = ["国家", "向", "动物", "而且", "地"];
        const exerciseSentences1 = [
          { text: ["你是从哪个", "来的？"], answer: "国家" },
          { text: ["坐火车的时候，我喜欢", "外看。"], answer: "向" },
          { text: ["你最喜欢什么", "？"], answer: "动物" },
          { text: ["这家饭馆不但菜很好吃，", "环境很好。"], answer: "而且" },
          { text: ["小孩子喜欢快乐", "学习。"], answer: "地" }
        ];

        const exerciseWords2 = ["段", "机会", "奇怪", "关于", "同意"];
        const exerciseSentences2 = [
          { text: ["过一", "时间以后再说吧。"], answer: "段" },
          { text: ["那儿的工作", "比较多。"], answer: "机会" },
          { text: ["真", "，桌子上的词典怎么不见了？"], answer: "奇怪" },
          { text: ["我家有很多", "中国文化的电影光盘。"], answer: "关于" },
          { text: ["我不", "，虽然很便宜，但是离公司太远了。"], answer: "同意" }
        ];

        // --- UTILS ---
        const speak = (text) => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            window.speechSynthesis.speak(utterance);
          } else {
            alert("Kechirasiz, sizning brauzeringiz ovozli o'qishni qo'llab-quvvatlamaydi.");
          }
        };

        // --- COMPONENTS ---
        function Flashcards() {
          const [index, setIndex] = useState(0);
          const [isFlipped, setIsFlipped] = useState(false);

          const word = vocabList[index];

          const handleNext = () => {
            setIsFlipped(false);
            setTimeout(() => setIndex((prev) => (prev + 1) % vocabList.length), 150);
          };

          const handlePrev = () => {
            setIsFlipped(false);
            setTimeout(() => setIndex((prev) => (prev - 1 + vocabList.length) % vocabList.length), 150);
          };

          return (
            <div className="flex flex-col items-center">
              <div className="text-slate-500 mb-4">{index + 1} / {vocabList.length}</div>
              
              <div className="relative w-full max-w-md h-80 perspective-1000 mb-8 cursor-pointer" onClick={() => setIsFlipped(!isFlipped)}>
                <div className={`w-full h-full transition-transform duration-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                  
                  {/* Front */}
                  <div className="absolute w-full h-full backface-hidden bg-white rounded-2xl shadow-xl flex flex-col items-center justify-center p-8 border-2 border-teal-100">
                    <button 
                      onClick={(e) => { e.stopPropagation(); speak(word.chars); }}
                      className="absolute top-4 right-4 p-2 text-teal-600 hover:bg-teal-50 rounded-full"
                    >
                      <Volume2 size={28} />
                    </button>
                    <h2 className="text-7xl font-bold text-slate-800 mb-4">{word.chars}</h2>
                    <p className="text-2xl text-teal-600">{word.pinyin}</p>
                  </div>

                  {/* Back */}
                  <div className="absolute w-full h-full backface-hidden bg-teal-600 text-white rounded-2xl shadow-xl flex flex-col items-center justify-center p-8 rotate-y-180 text-center">
                    <h3 className="text-3xl font-bold mb-4">{word.uz}</h3>
                    <div className="w-16 h-1 bg-teal-400 mb-4 rounded"></div>
                    <p className="text-xl mb-2 text-teal-50 italic">{word.ru}</p>
                    <p className="text-xl text-teal-100">{word.en}</p>
                  </div>

                </div>
              </div>

              <div className="flex gap-4">
                <button onClick={handlePrev} className="p-4 bg-white shadow rounded-full text-teal-600 hover:bg-teal-50">
                  <ChevronLeft size={24} />
                </button>
                <button onClick={handleNext} className="p-4 bg-white shadow rounded-full text-teal-600 hover:bg-teal-50">
                  <ChevronRight size={24} />
                </button>
              </div>
            </div>
          );
        }

        function Quiz({ data, title }) {
          const [currentQ, setCurrentQ] = useState(0);
          const [score, setScore] = useState(0);
          const [showResult, setShowResult] = useState(false);
          const [selected, setSelected] = useState(null);

          const handleAnswer = (option) => {
            setSelected(option);
            if (option === data[currentQ].answer) setScore(score + 1);
            
            setTimeout(() => {
              setSelected(null);
              if (currentQ < data.length - 1) {
                setCurrentQ(currentQ + 1);
              } else {
                setShowResult(true);
              }
            }, 1000);
          };

          const restart = () => {
            setCurrentQ(0);
            setScore(0);
            setShowResult(false);
            setSelected(null);
          };

          if (showResult) {
            return (
              <div className="bg-white p-8 rounded-2xl shadow-lg text-center max-w-lg mx-auto border-t-4 border-teal-500">
                <h2 className="text-3xl font-bold mb-4">Natija</h2>
                <p className="text-xl mb-6 text-slate-600">Siz {data.length} ta savoldan {score} tasiga to'g'ri javob berdingiz!</p>
                <div className="text-6xl mb-8">
                  {score === data.length ? '🏆' : score > data.length / 2 ? '👍' : '📚'}
                </div>
                <button onClick={restart} className="bg-teal-600 text-white px-8 py-3 rounded-full font-bold flex items-center justify-center gap-2 mx-auto hover:bg-teal-700">
                  <RotateCcw size={20} /> Qayta urinish
                </button>
              </div>
            );
          }

          const q = data[currentQ];

          return (
            <div className="max-w-2xl mx-auto">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-xl font-bold text-teal-700">{title}</h2>
                <span className="text-sm font-bold bg-teal-100 text-teal-800 px-3 py-1 rounded-full">
                  {currentQ + 1} / {data.length}
                </span>
              </div>

              <div className="bg-white p-8 rounded-2xl shadow-md mb-6 border border-slate-100 text-center">
                <h3 className="text-5xl font-bold text-slate-800 py-8">{q.q}</h3>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {q.options.map((opt, idx) => {
                  let btnClass = "bg-white border-2 border-slate-200 text-slate-700 hover:border-teal-500 hover:bg-teal-50";
                  if (selected) {
                    if (opt === q.answer) btnClass = "bg-green-100 border-green-500 text-green-800";
                    else if (opt === selected) btnClass = "bg-red-100 border-red-500 text-red-800";
                    else btnClass = "bg-white border-slate-200 text-slate-400 opacity-50";
                  }
                  
                  return (
                    <button
                      key={idx}
                      disabled={selected !== null}
                      onClick={() => handleAnswer(opt)}
                      className={`p-4 rounded-xl font-medium text-lg transition-all flex items-center justify-between ${btnClass}`}
                    >
                      <span>{opt}</span>
                      {selected && opt === q.answer && <CheckCircle2 className="text-green-600" size={20}/>}
                      {selected === opt && opt !== q.answer && <XCircle className="text-red-600" size={20}/>}
                    </button>
                  )
                })}
              </div>
            </div>
          );
        }

        function Dialogues() {
          return (
            <div className="max-w-3xl mx-auto space-y-8">
              {dialogues.map((dialogue, dIdx) => (
                <div key={dIdx} className="bg-white rounded-2xl shadow-md overflow-hidden">
                  <div className="bg-teal-600 text-white p-4 font-bold text-lg flex justify-between items-center">
                    {dialogue.title}
                  </div>
                  <div className="p-6 space-y-6">
                    {dialogue.lines.map((line, lIdx) => (
                      <div key={lIdx} className="flex gap-4 border-b border-slate-100 pb-6 last:border-0 last:pb-0">
                        <button 
                          onClick={() => speak(line.zh)}
                          className="mt-1 shrink-0 bg-teal-100 text-teal-600 p-2 rounded-full h-10 w-10 flex items-center justify-center hover:bg-teal-200 transition-colors"
                        >
                          <Play size={18} className="ml-1" />
                        </button>
                        <div>
                          <div className="mb-2">
                            <span className="font-bold text-slate-500 mr-2">{line.speaker}:</span>
                            <span className="text-xl font-bold text-slate-800">{line.zh}</span>
                          </div>
                          <p className="text-teal-600 mb-2">{line.pinyin}</p>
                          <div className="text-sm space-y-1">
                            <p className="text-slate-700"><span className="font-semibold text-slate-400 text-xs">UZ:</span> {line.uz}</p>
                            <p className="text-slate-600"><span className="font-semibold text-slate-400 text-xs">RU:</span> {line.ru}</p>
                            <p className="text-slate-500"><span className="font-semibold text-slate-400 text-xs">EN:</span> {line.en}</p>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          );
        }

        function Grammar() {
          return (
            <div className="max-w-3xl mx-auto space-y-8">
              {grammarRules.map((rule, idx) => (
                <div key={idx} className="bg-white rounded-2xl shadow-md p-6 border-l-4 border-teal-500">
                  <h3 className="text-2xl font-bold text-slate-800 mb-4">{rule.title}</h3>
                  
                  <div className="space-y-3 mb-6 bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <p className="text-slate-800 font-medium"><span className="text-xs font-bold text-teal-600 uppercase mr-2">UZ</span>{rule.uz}</p>
                    <p className="text-slate-700"><span className="text-xs font-bold text-blue-500 uppercase mr-2">RU</span>{rule.ru}</p>
                    <p className="text-slate-600"><span className="text-xs font-bold text-red-400 uppercase mr-2">EN</span>{rule.en}</p>
                  </div>

                  <div>
                    <h4 className="font-bold text-slate-500 mb-3 text-sm uppercase tracking-wider">Misollar / Примеры / Examples</h4>
                    <div className="space-y-3">
                      {rule.examples.map((ex, eIdx) => (
                        <div key={eIdx} className="flex gap-3 bg-white p-3 border border-slate-200 rounded-lg hover:border-teal-300 transition-colors">
                          <button onClick={() => speak(ex.zh)} className="text-teal-500 hover:text-teal-700 mt-1 shrink-0">
                            <Volume2 size={20} />
                          </button>
                          <div>
                            <p className="text-lg font-bold">{ex.zh}</p>
                            <p className="text-sm text-slate-500">{ex.pinyin}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          );
        }

        function ExerciseSentence({ index, item, options }) {
          const [val, setVal] = useState("");
          const isCorrect = val === item.answer;

          return (
            <div className="flex items-center flex-wrap gap-2 text-lg">
              <span className="text-slate-400 font-bold mr-2">{index + 1}.</span>
              <span>{item.text[0]}</span>
              <select 
                value={val} 
                onChange={(e) => setVal(e.target.value)}
                className={`border-b-2 outline-none font-bold text-center px-2 py-1 bg-transparent transition-colors cursor-pointer
                  ${val === "" ? "border-slate-300 w-24" : 
                    isCorrect ? "border-green-500 text-green-600" : "border-red-500 text-red-600"}`}
              >
                <option value="" disabled></option>
                {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
              </select>
              <span>{item.text[1]}</span>
              {val !== "" && (
                isCorrect ? <CheckCircle2 className="text-green-500 ml-2" size={20}/> : <XCircle className="text-red-500 ml-2" size={20}/>
              )}
            </div>
          );
        }

        function Exercises() {
          return (
            <div className="max-w-3xl mx-auto space-y-8">
              
              <div className="bg-white p-6 rounded-2xl shadow-md">
                <div className="flex flex-wrap gap-3 mb-6 p-4 bg-teal-50 rounded-xl justify-center">
                  {exerciseWords1.map(w => <span key={w} className="bg-white px-4 py-2 rounded-lg font-bold text-teal-700 shadow-sm border border-teal-100">{w}</span>)}
                </div>
                <div className="space-y-4">
                  {exerciseSentences1.map((item, idx) => (
                     <ExerciseSentence key={idx} index={idx} item={item} options={exerciseWords1} />
                  ))}
                </div>
              </div>

              <div className="bg-white p-6 rounded-2xl shadow-md">
                <div className="flex flex-wrap gap-3 mb-6 p-4 bg-teal-50 rounded-xl justify-center">
                  {exerciseWords2.map(w => <span key={w} className="bg-white px-4 py-2 rounded-lg font-bold text-teal-700 shadow-sm border border-teal-100">{w}</span>)}
                </div>
                <div className="space-y-4">
                  {exerciseSentences2.map((item, idx) => (
                     <ExerciseSentence key={idx} index={idx} item={item} options={exerciseWords2} />
                  ))}
                </div>
              </div>

            </div>
          );
        }

        function HSKApp() {
          const [activeTab, setActiveTab] = useState('flashcards');

          const tabs = [
            { id: 'flashcards', label: "So'zlar" },
            { id: 'vocabTest', label: "So'zlar testi" },
            { id: 'dialogues', label: "Matnlar" },
            { id: 'grammar', label: "Grammatika" },
            { id: 'grammarTest', label: "Grammatika testi" },
            { id: 'exercises', label: "Mashqlar" }
          ];

          return (
            <div className="min-h-screen pb-20 flex flex-col">
              {/* Header */}
              <header className="bg-teal-600 text-white p-6 shadow-md text-center shrink-0">
                <h1 className="text-3xl font-bold mb-2">18 我相信他们会同意的</h1>
                <h2 className="text-xl opacity-90">Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz</h2>
              </header>

              {/* Navigation */}
              <nav className="bg-white shadow flex flex-wrap justify-center overflow-x-auto p-2 shrink-0">
                {tabs.map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`px-4 py-2 m-1 rounded-full text-sm font-medium transition-colors ${
                      activeTab === tab.id ? 'bg-teal-600 text-white shadow-inner' : 'bg-slate-100 text-slate-600 hover:bg-teal-100'
                    }`}
                  >
                    {tab.label}
                  </button>
                ))}
              </nav>

              {/* Main Content Area */}
              <main className="flex-grow p-4 md:p-8 max-w-4xl mx-auto w-full">
                {activeTab === 'flashcards' && <Flashcards />}
                {activeTab === 'vocabTest' && <Quiz data={vocabTestQuestions} title="So'zlar testi" />}
                {activeTab === 'dialogues' && <Dialogues />}
                {activeTab === 'grammar' && <Grammar />}
                {activeTab === 'grammarTest' && <Quiz data={grammarTestQuestions} title="Grammatika testi" />}
                {activeTab === 'exercises' && <Exercises />}
              </main>

              {/* Footer */}
              <footer className="bg-slate-800 text-slate-300 p-4 text-center text-sm shrink-0">
                HSK 3 Standard Course - Lesson 18 <br/>
                © 2026 Dilfuza Kāng lǎo shī (telegram@diffila)
              </footer>
            </div>
          );
        }

        // --- RENDER ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HSKApp />);
    </script>
</body>
</html>
